name: CI

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    working-directory: 03-build/web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: 03-build/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Build
        run: npm run build

  integration:
    runs-on: ubuntu-latest
    # Stretch coverage for the destructive DB-touching paths (merge/relink/
    # ingest) — see 03-build/web/README.md "Integration tests". Deliberately
    # NOT required: continue-on-error means a red run shows up in the PR
    # checks (visible) without blocking the main job / merge.
    continue-on-error: true
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://postgres:test@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: 03-build/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Integration tests
        run: npm run test:integration
